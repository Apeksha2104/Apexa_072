<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced BMI Calculator</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #4b5563;
            --border-color: #e5e7eb;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 480px;
        }

        h2 {
            margin-top: 0;
            color: var(--text-main);
            text-align: center;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-muted);
        }

        input[type="number"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus, select:focus {
            border-color: var(--primary-color);
        }

        .radio-group {
            display: flex;
            gap: 15px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: normal;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }


        .result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            background-color: #f9fafb;
            border: 1px solid var(--border-color);
            text-align: center;
            display: none;
        }

        .bmi-score {
            font-size: 36px;
            font-weight: bold;
            color: var(--primary-color);
            margin: 10px 0;
        }

        .bmi-status {
            font-size: 18px;
            font-weight: 600;
        }

        .reference-table {
            margin-top: 25px;
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .reference-table th, .reference-table td {
            border: 1px solid var(--border-color);
            padding: 8px;
            text-align: left;
        }

        .reference-table th {
            background-color: #f3f4f6;
        }

        .highlight-row {
            background-color: rgba(79, 70, 229, 0.1) !important;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>BMI Calculator</h2>
    <form id="bmiForm">
        <div class="form-group">
            <label>Gender</label>
            <div class="radio-group">
                <label class="radio-label"><input type="radio" name="gender" value="Male" checked> Male</label>
                <label class="radio-label"><input type="radio" name="gender" value="Female"> Female</label>
            </div>
        </div>

        <div class="form-group">
            <label for="age">Age </label>
            <input type="number" id="age" min="1" max="120" placeholder="e.g., 25" required>
        </div>

        <div class="form-group">
            <label for="height">Height (cm)</label>
            <input type="number" id="height" min="50" max="250" placeholder="e.g., 175" required>
        </div>

        <div class="form-group">
            <label for="weight">Weight (kg)</label>
            <input type="number" id="weight" min="1" max="500" placeholder="e.g., 70" required>
        </div>

        <button type="submit">Calculate BMI</button>
    </form>

    <div class="result-box" id="resultBox">
        <div>Your BMI is</div>
        <div class="bmi-score" id="bmiScore">22.9</div>
        <div class="bmi-status" id="bmiStatus">Normal</div>
    </div>

    <table class="reference-table">
        <thead>
            <tr>
                <th>Classification</th>
                <th>BMI Range (kg/m²)</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr data-min="0" data-max="16"><td>Severe Thinness</td><td>&lt; 16</td></tr>
            <tr data-min="16" data-max="17"><td>Moderate Thinness</td><td>16 - 17</td></tr>
            <tr data-min="17" data-max="18.5"><td>Mild Thinness</td><td>17 - 18.5</td></tr>
            <tr data-min="18.5" data-max="25"><td>Normal</td><td>18.5 - 25</td></tr>
            <tr data-min="25" data-max="30"><td>Overweight</td><td>25 - 30</td></tr>
            <tr data-min="30" data-max="35"><td>Obese Class I</td><td>30 - 35</td></tr>
            <tr data-min="35" data-max="40"><td>Obese Class II</td><td>35 - 40</td></tr>
            <tr data-min="40" data-max="999"><td>Obese Class III</td><td>&gt; 40</td></tr>
        </tbody>
    </table>
</div>

<script>
    document.getElementById('bmiForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const heightCm = parseFloat(document.getElementById('height').value);
        const weightKg = parseFloat(document.getElementById('weight').value); 
        const heightM = heightCm / 100;
        const bmi = weightKg / (heightM * heightM);
        const finalBmi = bmi.toFixed(1);

        let status = "";
        if (bmi < 16) status = "Severe Thinness";
        else if (bmi >= 16 && bmi < 17) status = "Moderate Thinness";
        else if (bmi >= 17 && bmi < 18.5) status = "Mild Thinness";
        else if (bmi >= 18.5 && bmi < 25) status = "Normal";
        else if (bmi >= 25 && bmi < 30) status = "Overweight";
        else if (bmi >= 30 && bmi < 35) status = "Obese Class I";
        else if (bmi >= 35 && bmi < 40) status = "Obese Class II";
        else status = "Obese Class III";

        document.getElementById('bmiScore').innerText = finalBmi;
        document.getElementById('bmiStatus').innerText = status;
        document.getElementById('resultBox').style.display = 'block';

        const rows = document.querySelectorAll('#tableBody tr');
        rows.forEach(row => {
            row.classList.remove('highlight-row');
            const min = parseFloat(row.getAttribute('data-min'));
            const max = parseFloat(row.getAttribute('data-max'));
            if (bmi >= min && bmi < max) {
                row.classList.add('highlight-row');
            }
        });
    });
</script>
</body>
</html>
